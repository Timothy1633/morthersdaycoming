<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致最爱的妈妈</title>
    <style>
        :root {
            --baby-blue: #A2D2FB;
            --paper-cream: #FAF9F6;
            --accent-pink: #FFB7C5;
            --seal-red: #B71C1C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #B2EBF2 0%, #7DB9DE 100%);
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* 防止移动端缩放干扰交互 */
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* --- 3D信封 --- */
        .envelope-wrapper {
            position: relative;
            width: 280px; height: 180px;
            background: #fff;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 200;
            perspective: 1000px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .envelope-wrapper:hover { transform: translateY(-10px) rotate(2deg); }
        .envelope-flap {
            position: absolute; top: 0; left: 0;
            width: 0; height: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-top: 100px solid #f3f3f3;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
        }
        .envelope-wrapper.open .envelope-flap { transform: rotateX(180deg); }
        .envelope-body { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2; border: 1px solid #f0f0f0; }
        .envelope-text { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); color: var(--baby-blue); letter-spacing: 5px; font-weight: bold; }

        /* --- 弹窗窗口 --- */
        .sys-win {
            position: absolute;
            width: 150px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            overflow: hidden;
            display: none;
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .win-header { padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; color: #fff; font-size: 10px; }
        .win-body { padding: 12px; text-align: center; font-size: 13px; color: #444; }

        /* --- 贺卡信笺 --- */
        .formal-letter {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%; max-width: 380px;
            background: var(--paper-cream);
            padding: 45px 30px;
            z-index: 1000;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid #E0DCC5;
        }
        .formal-letter.show { transform: translate(-50%, -50%) scale(1); }
        .letter-content { font-size: 1.1rem; color: #34495E; line-height: 2; margin: 20px 0; font-style: italic; }
        .wax-seal {
            width: 55px; height: 55px; background: var(--seal-red);
            border-radius: 50%; margin: 20px auto 0;
            display: flex; align-items: center; justify-content: center;
            color: #FFD700; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #8E0000; cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.65) rotate(var(--r)); }
            50% { transform: scale(0.7) rotate(var(--r)); }
        }

        .hint { position: fixed; bottom: 20px; color: #fff; opacity: 0.6; font-size: 12px; z-index: 500; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="hint">点击屏幕任何位置，绽放互动烟花</div>

<!-- 初始信封 -->
<div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
    <div class="envelope-flap"></div>
    <div class="envelope-body"></div>
    <div class="envelope-text">FOR MOM</div>
</div>

<!-- 正式贺卡 -->
<div class="formal-letter" id="letter">
    <div style="font-size: 14px; color: #999;">亲爱的妈妈,</div>
    <div class="letter-content">
        纸短情长。<br>
        感谢您一直以来的无私奉献，<br>
        希望你永远开心，<br>
        愿您不只在这个日子里，满心欢喜。<br>
        母亲节快乐！
    </div>
    <div style="text-align: right; color: #999; font-size: 14px;">桂琳 寄</div>
    <div class="wax-seal" onclick="location.reload()">爱你</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const envelope = document.getElementById('envelope');
    const letter = document.getElementById('letter');

    let width, height, fireworks = [], particles = [], winObjects = [];
    const themes = [{h:"#FF85A2",b:"#FFF5F7"}, {h:"#7DB9DE",b:"#F0F9FF"}, {h:"#FFB347",b:"#FFFBF0"}, {h:"#BDB2FF",b:"#F8F7FF"}];
    const messages = ["记得多喝水", "少熬夜哦", "天天开心", "永远年轻", "最好的妈妈", "爱你哟", "万事如意", "身体健康"];

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', init);
    init();

    // 烟花引擎代码
    class Particle {
        constructor(x, y, color, speed, angle, friction, gravity) {
            this.x = x; this.y = y;
            this.color = color;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.friction = friction || 0.95;
            this.gravity = gravity || 0.15;
            this.alpha = 1;
            this.decay = Math.random() * 0.015 + 0.01;
            this.history = [];
        }
        update() {
            this.history.push({x: this.x, y: this.y});
            if(this.history.length > 12) this.history.shift();
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
        }
        draw() {
            if(this.alpha <= 0 || this.history.length < 2) return;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for(let p of this.history) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2.5;
            ctx.globalAlpha = this.alpha;
            ctx.lineCap = 'round';
            ctx.stroke();
            // 核心微光
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1, 0, Math.PI*2);
            ctx.fillStyle = "#FFF";
            ctx.fill();
            ctx.restore();
        }
    }

    function createFirework(x, y, isLuxury = false) {
        const count = isLuxury ? 60 : 30;
        const hue = Math.random() * 360;
        const color = `hsla(${hue}, 100%, 75%, 1)`;
        for(let i=0; i<count; i++) {
            const angle = Math.PI * 2 * (i / count);
            const speed = Math.random() * 8 + 2;
            particles.push(new Particle(x, y, color, speed, angle));
            // 增加多层爆炸效果
            if(isLuxury && i % 2 === 0) {
                particles.push(new Particle(x, y, "#FFF", speed * 0.6, angle + 0.2));
            }
        }
    }

    // 交互监听
    window.addEventListener('mousedown', (e) => {
        createFirework(e.clientX, e.clientY, true);
    });
    window.addEventListener('touchstart', (e) => {
        createFirework(e.touches[0].clientX, e.touches[0].clientY, true);
    });

    // 动画主循环
    function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.alpha <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    // 信封与弹窗逻辑
    function openEnvelope() {
        envelope.classList.add('open');
        setTimeout(() => {
            envelope.style.opacity = '0';
            envelope.style.pointerEvents = 'none';
            const count = 40;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const theme = themes[i % themes.length];
                    const win = document.createElement('div');
                    win.className = 'sys-win';
                    win.style.left = (width/2 - 75) + 'px';
                    win.style.top = (height/2 - 40) + 'px';
                    win.style.display = 'block';
                    win.innerHTML = `<div class="win-header" style="background:${theme.h}"><span>温馨提示</span><div class="close-btn">×</div></div>
                                     <div class="win-body" style="background:${theme.b}">${messages[Math.floor(Math.random()*messages.length)]}</div>`;
                    document.body.appendChild(win);
                    
                    const tx = Math.random()*(width-150), ty = Math.random()*(height-100);
                    setTimeout(() => {
                        win.style.left = tx + 'px'; win.style.top = ty + 'px';
                        win.style.transform = `rotate(${Math.random()*20-10}deg)`;
                    }, 20);
                    winObjects.push(win);
                    if(winObjects.length === count) setTimeout(gather, 1500);
                }, i * 40);
            }
        }, 800);
    }

    function gather() {
        const cx = width/2, cy = height*0.45, s = width < 500 ? 9 : 14;
        winObjects.forEach((win, i) => {
            setTimeout(() => {
                const t = (i / winObjects.length) * Math.PI * 2;
                const tx = cx + 16 * Math.pow(Math.sin(t), 3) * s;
                const ty = cy - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s;
                const r = Math.random()*20-10;
                win.style.setProperty('--r', `${r}deg`);
                win.style.left = (tx - 75) + 'px'; win.style.top = (ty - 40) + 'px';
                win.style.transform = `scale(0.65) rotate(${r}deg)`;
                setTimeout(() => win.style.animation = 'pulse 2s infinite ease-in-out', 1200);
            }, i * 20);
        });

        setTimeout(() => {
            winObjects.forEach(w => { w.style.opacity='0'; w.style.transform='scale(0) translateY(-100px)'; });
            letter.classList.add('show');
            // 开场礼花
            for(let i=0; i<5; i++) {
                setTimeout(() => createFirework(Math.random()*width, Math.random()*height*0.5, true), i * 300);
            }
            // 自动持续烟花
            setInterval(() => createFirework(Math.random()*width, Math.random()*height*0.6, false), 1000);
        }, 4500);
    }
</script>
</body>
</html>
